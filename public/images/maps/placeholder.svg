<svg xmlns="http://www.w3.org/2000/svg" width="400" height="250" viewBox="0 0 400 250">
  <defs>
    <linearGradient id="mirageGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#D4A574"/>
      <stop offset="100%" style="stop-color:#8B6F47"/>
    </linearGradient>
    <linearGradient id="dust2Grad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#C4A777"/>
      <stop offset="100%" style="stop-color:#8B7355"/>
    </linearGradient>
    <linearGradient id="infernoGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#5D7A5F"/>
      <stop offset="100%" style="stop-color:#3D5A3F"/>
    </linearGradient>
    <linearGradient id="nukeGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#4A6FA5"/>
      <stop offset="100%" style="stop-color:#2D4A6F"/>
    </linearGradient>
    <linearGradient id="overpassGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#5A6A7A"/>
      <stop offset="100%" style="stop-color:#3A4A5A"/>
    </linearGradient>
    <linearGradient id="ancientGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#6B8E5E"/>
      <stop offset="100%" style="stop-color:#4B6E3E"/>
    </linearGradient>
    <linearGradient id="anubisGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#D4A854"/>
      <stop offset="100%" style="stop-color:#9B7A34"/>
    </linearGradient>
  </defs>
  
  <!-- Background -->
  <rect width="400" height="250" fill="url(#mirageGrad)"/>
  
  <!-- Map outline decoration -->
  <path d="M50,50 L350,50 L350,200 L50,200 Z" fill="none" stroke="rgba(255,255,255,0.2)" stroke-width="2"/>
  <circle cx="100" cy="100" r="30" fill="none" stroke="rgba(255,255,255,0.15)" stroke-width="2"/>
  <circle cx="300" cy="150" r="40" fill="none" stroke="rgba(255,255,255,0.15)" stroke-width="2"/>
  <rect x="150" y="80" width="100" height="90" fill="none" stroke="rgba(255,255,255,0.15)" stroke-width="2"/>
  
  <!-- Text -->
  <text x="200" y="230" text-anchor="middle" fill="white" font-size="24" font-weight="bold" opacity="0.8">
    MIRAGE
