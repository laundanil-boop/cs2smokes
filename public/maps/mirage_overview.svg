<svg xmlns="http://www.w3.org/2000/svg" width="800" height="800">
  <rect fill="#1f2937" width="800" height="800"/>
  <!-- Декоративные элементы карты -->
  <rect fill="#374151" x="100" y="100" width="600" height="600" rx="20"/>
  <rect fill="#4b5563" x="150" y="150" width="500" height="500" rx="10"/>
  
  <!-- A Site -->
  <circle fill="#f59e0b" cx="600" cy="250" r="40"/>
  <text fill="#ffffff" x="600" y="255" text-anchor="middle" font-size="14" font-weight="bold">A</text>
  
  <!-- B Site -->
  <circle fill="#f59e0b" cx="650" cy="550" r="40"/>
  <text fill="#ffffff" x="650" y="555" text-anchor="middle" font-size="14" font-weight="bold">B</text>
  
  <!-- Mid -->
  <rect fill="#6b7280" x="350" y="350" width="100" height="100" rx="10"/>
  <text fill="#ffffff" x="400" y="405" text-anchor="middle" font-size="14" font-weight="bold">MID</text>
  
  <!-- Spawn T -->
  <rect fill="#10b981" x="50" y="650" width="100" height="80" rx="10"/>
  <text fill="#ffffff" x="100" y="695" text-anchor="middle" font-size="12">T Spawn</text>
  
  <!-- Spawn CT -->
  <rect fill="#3b82f6" x="650" y="50" width="100" height="80" rx="10"/>
  <text fill="#ffffff" x="700" y="95" text-anchor="middle" font-size="12">CT Spawn</text>
  
  <!-- Название карты -->
  <text fill="#ffffff" x="400" y="50" text-anchor="middle" font-size="24" font-weight="bold">MIRAGE</text>
  <text fill="#9ca3af" x="400" y="780" text-anchor="middle" font-size="14">Overview Map</text>
</svg>
